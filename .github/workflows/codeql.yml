name: "CodeQL Deep Scan"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly deep scan
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL Deep Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]  # CodeQL uses cpp for C/C++ analysis

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality
        # Use more advanced analysis
        packs: +codeql/cpp-queries:security-and-quality.qls
        # Reference custom CodeQL configuration
        config-file: .github/codeql/codeql-config.yml

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang-format cppcheck

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
        # Enable deeper analysis with more thoroughness
        upload: true
        # Maximum analysis time for deep scanning
        timeout: 360
