# CodeQL Configuration for Deep Scanning
# This configuration enables maximum security analysis for the noxe-editor C project

packs:
  # Use comprehensive security query packs
  - codeql/cpp-queries:security-and-quality.qls
  - codeql/cpp-queries:security-extended.qls

# Deep analysis configuration
queries:
  - uses: security-extended
  - uses: security-and-quality

# Paths to include in analysis
paths:
  - src
  - libmemory
  - test_*.c

# Paths to exclude from analysis
paths-ignore:
  - docs
  - changelog
  - prototype
  - "*.md"
  - "*.txt"

# Build mode - use autobuild to let CodeQL detect the build system
build-mode: autobuild
